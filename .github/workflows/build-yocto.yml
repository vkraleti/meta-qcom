name: Build Yocto

on:
  workflow_call:
    inputs:
      sdk:
        required: false
        type: string
        default: "0"
    outputs:
      artifacts_url:
        description: "URL to retrieve build artifacts"
        value: ${{ jobs.create-output.outputs.url }}

# Concurrency is used to prevent multiple workflows from running for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: true

env:
  CACHE_DIR: /efs/qli/meta-qcom
  KAS_CLONE_DEPTH: 1

jobs:
  kas-setup:
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [self-hosted, qcom-u2404, amd64]
    steps:
      - name: Setting up kas-container
        run: |
          KAS_CONTAINER=$RUNNER_TEMP/kas-container
          echo "KAS_CONTAINER=$KAS_CONTAINER" >> $GITHUB_ENV
          LATEST=$(git ls-remote --tags --refs --sort="v:refname" https://github.com/siemens/kas | tail -n1 | sed 's/.*\///')
          wget -qO ${KAS_CONTAINER} https://raw.githubusercontent.com/siemens/kas/refs/tags/$LATEST/kas-container
          chmod +x ${KAS_CONTAINER}

      - uses: actions/checkout@v4

      - name: Run kas lock
        run: |
          ${KAS_CONTAINER} lock --update ci/base.yml:ci/qcom-distro.yml

      - name: Upload kas lockfile
        uses: actions/upload-artifact@v6
        with:
          name: kas-lockfile
          path: ci/*.lock.yml

      - name: Upload kas-container
        uses: actions/upload-artifact@v6
        with:
          name: kas-container
          path: ${{ env.KAS_CONTAINER }}

  yocto-run-checks:
    needs: kas-setup
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [self-hosted, qcom-u2404, amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Download kas lockfile
        uses: actions/download-artifact@v7
        with:
          name: kas-lockfile
          path: ci

      - name: Download kas-container
        uses: actions/download-artifact@v7
        with:
          name: kas-container
          path: ${{ runner.temp }}

      - name: Setting up kas-container
        run: |
          KAS_CONTAINER=$RUNNER_TEMP/kas-container
          echo "KAS_CONTAINER=$KAS_CONTAINER" >> $GITHUB_ENV
          chmod +x $KAS_CONTAINER

      - name: Run yocto-check-layer
        run: |
          ci/kas-container-shell-helper.sh ci/yocto-check-layer.sh

      - name: Run Yocto patchreview
        run: |
          ci/kas-container-shell-helper.sh ci/yocto-patchreview.sh

  compile_warm_up:
    needs: kas-setup
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [self-hosted, qcom-u2404, amd64]
    strategy:
      fail-fast: true
      matrix:
        machine:
          - rb3gen2-core-kit
          - qcom-armv8a
        distro:
          - name: nodistro
            yamlfile: ""
          - name: qcom-distro
            yamlfile: ':ci/qcom-distro-prop-image.yml'
          - name: qcom-distro-catchall
            yamlfile: ':ci/qcom-distro-catchall.yml'
          - name: debug
            yamlfile: ':ci/qcom-distro-prop-image.yml:ci/debug.yml'
          - name: performance
            yamlfile: ':ci/qcom-distro-prop-image.yml:ci/performance.yml'
        kernel:
          - type: default
            dirname: ""
            yamlfile: ""
          - type: 6.18
            dirname: "_linux-qcom-6.18"
            yamlfile: ":ci/linux-qcom-6.18.yml"
          - type: rt-6.18-distro-kvm
            dirname: "_linux-qcom-rt-6.18_qcom-distro-kvm"
            yamlfile: ":ci/linux-qcom-rt-6.18.yml:ci/qcom-distro-kvm.yml"
    name: ${{ matrix.machine }}/${{ matrix.distro.name }}${{ matrix.kernel.dirname }}
    steps:
      - uses: actions/checkout@v4

      - name: Run kas build
        uses: ./.github/actions/compile
        with:
          machine: ${{matrix.machine}}
          distro_yaml: ${{matrix.distro.yamlfile}}
          distro_name: ${{matrix.distro.name}}
          kernel_yaml: ${{matrix.kernel.yamlfile}}
          kernel_dirname: ${{matrix.kernel.dirname}}
          cache_dir: ${CACHE_DIR}
          sdk: ${{inputs.sdk}}

  compile:
    needs: compile_warm_up
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [self-hosted, qcom-u2404, amd64]
    outputs:
      url: ${{ steps.compile_kas.outputs.url }}
    strategy:
      fail-fast: false
      matrix:
        machine:
          - glymur-crd
          - iq-615-evk
          - iq-8275-evk
          - iq-9075-evk
          - iq-x7181-evk
          - kaanapali-mtp
          - qcm6490-idp
          - qcs615-ride
          - qcs8300-ride-sx
          - qcs9100-ride-sx
          - rb1-core-kit
          - sm8750-mtp
        distro:
          - name: nodistro
            yamlfile: ""
          - name: qcom-distro
            yamlfile: ':ci/qcom-distro-prop-image.yml'
          - name: qcom-distro-catchall
            yamlfile: ':ci/qcom-distro-catchall.yml'
          - name: debug
            yamlfile: ':ci/qcom-distro-prop-image.yml:ci/debug.yml'
          - name: performance
            yamlfile: ':ci/qcom-distro-prop-image.yml:ci/performance.yml'
        kernel:
          - type: default
            dirname: ""
            yamlfile: ""
          - type: 6.18
            dirname: "_linux-qcom-6.18"
            yamlfile: ":ci/linux-qcom-6.18.yml"
          - type: rt-6.18-distro-kvm
            dirname: "_linux-qcom-rt-6.18_qcom-distro-kvm"
            yamlfile: ":ci/linux-qcom-rt-6.18.yml:ci/qcom-distro-kvm.yml"
        include:
          # Additional builds for specific machines
          - machine: qcom-armv8a
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro-prop-image.yml'
            kernel:
                type: additional
                dirname: "_linux-yocto-dev"
                yamlfile: ":ci/linux-yocto-dev.yml"
          - machine: iq-9075-evk
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro-prop-image.yml'
            kernel:
                type: qcom-next-rt
                dirname: "_linux-qcom-next-rt"
                yamlfile: ":ci/linux-qcom-next-rt.yml"
          - machine: iq-9075-evk
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: iq-8275-evk
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcom-armv7a
            distro:
                name: nodistro
                yamlfile: ''
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcom-armv7a
            distro:
                name: qcom-distro
                yamlfile: ':ci/qcom-distro.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
          - machine: qcs615-ride
            distro:
                name: nodistro
                yamlfile: ''
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: rb3gen2-core-kit
            distro:
                name: nodistro
                yamlfile: ''
            kernel:
                type: u-boot-qcom-6.18
                dirname: "_linux-qcom-6.18_u-boot-qcom"
                yamlfile: ":ci/linux-qcom-6.18.yml:ci/u-boot-qcom.yml"
          - machine: rb3gen2-core-kit-open-fw
            distro:
                name: qcom-distro-kvm
                yamlfile: ':ci/qcom-distro-kvm.yml'
            kernel:
                type: default
                dirname: ""
                yamlfile: ""
    name: ${{ matrix.machine }}/${{ matrix.distro.name }}${{ matrix.kernel.dirname }}
    steps:
      - uses: actions/checkout@v4

      - name: Run kas build
        uses: ./.github/actions/compile
        id: compile_kas
        with:
          machine: ${{matrix.machine}}
          distro_yaml: ${{matrix.distro.yamlfile}}
          distro_name: ${{matrix.distro.name}}
          kernel_yaml: ${{matrix.kernel.yamlfile}}
          kernel_dirname: ${{matrix.kernel.dirname}}
          cache_dir: ${CACHE_DIR}
          sdk: ${{inputs.sdk}}

  publish_summary:
    needs: compile
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/print-build-output
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: build-url*

